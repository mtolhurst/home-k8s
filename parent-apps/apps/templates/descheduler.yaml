apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io 
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: 
      prune: true 
      selfHeal: true
      allowEmpty: false 
  destination:
    namespace: descheduler
    server: {{ .Values.spec.destination.server }}
  project: default
  sources:
    - chart: descheduler
      repoURL: https://kubernetes-sigs.github.io/descheduler/
      targetRevision: 0.36.0
      helm:
        valuesObject:
          kind: CronJob
          cronJobSchedule: "*/30 * * * *"
          deschedulerPolicy:
            apiVersion: "descheduler/v1alpha2"
            kind: "DeschedulerPolicy"
            profiles:
              - name: DefaultProfile
                plugins:
                  balance:
                    enabled:
                      - "LowNodeUtilization"
                pluginConfig:
                  - name: "LowNodeUtilization"
                    args:
                      thresholds:
                        "cpu": 35
                        "memory": 35
                      targetThresholds:
                        "cpu": 50
                        "memory": 50
