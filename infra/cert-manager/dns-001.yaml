apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dns-issuer
spec:
  acme:
    email: lets_encrypt@tolly-home.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: dns-acme-account-key
    solvers:
    - dns01:
        route53:
          region: us-east-1
          accessKeyIDSecretRef:
            name: route53-credentials-secret
            key: access-key-id
          secretAccessKeySecretRef:
            name: route53-credentials-secret
            key: secret-access-key
