---
apiVersion: v1
kind: Secret
metadata:
  name: versity-secret
  namespace: cnpg-system
type: Opaque
data:
  AWS_ACCESS_KEY_ID: YWRtaW4=
  AWS_SECRET_ACCESS_KEY: YWRtaW4= 
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: versity-store
spec:
  configuration:
    destinationPath: s3://cnpg-backups/mealie/
    endpointURL: http://s3-gw.versitygw.svc.cluster.local
    s3Credentials:
      accessKeyId:
        name: versity-secret
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: versity-secret
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
