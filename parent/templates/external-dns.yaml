apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io 
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: 
      prune: true 
      selfHeal: true
      allowEmpty: false 
  destination:
    namespace: external-dns
    server: {{ .Values.spec.destination.server }}
  project: default
  sources:
    - chart: external-dns
      repoURL: https://kubernetes-sigs.github.io/external-dns
      targetRevision: 0.20.0
      helm:
        valuesObject:
          provider: aws
          aws:
            region: us-east-1
            zoneType: public
          domainFilters:
            - k8s.tolly-home.com
          txtOwnerId: home-k8s
          policy: sync
          registry: txt
          txtPrefix: "extdns."
          sources:
            - service
            - gateway
          extraVolumes:
            - name: aws-credentials
              secret:
                secretName: external-dns 
          extraVolumeMounts:
            - name: aws-credentials
              mountPath: /etc/aws/credentials
              readOnly: true
