---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-config-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 4Gi
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: multimedia
  labels:
    app: sabnzbd
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sabnzbd-config-pvc
        - name: tmp
          persistentVolumeClaim:
            claimName: media-tmp-pvc
        - name: intermediate
          emptyDir:
            sizeLimit: 50Gi
      containers:
        - name: sabnzbd
          image: lscr.io/linuxserver/sabnzbd:5.0.1
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Australia/Sydney
          volumeMounts:
            - name: config
              mountPath: /config
            - name: intermediate
              mountPath: /incomplete-downloads
            - name: tmp
              mountPath: /downloads
              subPath: complete
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: http
      name: http
  selector:
    app: sabnzbd
  type: LoadBalancer
---
