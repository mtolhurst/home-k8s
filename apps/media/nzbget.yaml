---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nzbget-config-pvc
  labels:
    backup: daily
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nzbget
  namespace: multimedia
  labels:
    app: nzbget
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: nzbget
  template:
    metadata:
      labels:
        app: nzbget
    spec:
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: nzbget-config-pvc
        - name: tmp
          persistentVolumeClaim:
            claimName: media-tmp-pvc
        - name: intermediate
          emptyDir:
            sizeLimit: 50Gi
      containers:
        - name: nzbget
          image: lscr.io/linuxserver/nzbget:26.2.20260703
          ports:
            - name: http
              containerPort: 6789
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Australia/Sydney
          volumeMounts:
            - name: config
              mountPath: /config
            - name: intermediate
              mountPath: /intermediate
            - name: tmp
              mountPath: /complete
              subPath: complete
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: nzbget
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: http
      name: http
  selector:
    app: nzbget
  type: ClusterIP
---

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: dns-issuer
  name: nzbget-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: nzb.k8s.tolly-home.com
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: nzbget-https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-nzb
spec:
  parentRefs:
    - name: nzbget-gateway
  hostnames:
    - nzb.k8s.tolly-home.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: nzbget
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
