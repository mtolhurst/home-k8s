---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-pvc
  labels:
    backup: daily
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: multimedia
  labels:
    app: radarr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: radarr-pvc
        - name: media
          nfs:
            server: nas.home
            path: /mnt/nas/media
            readonly: false
        - name: tmp
          persistentVolumeClaim:
            claimName: media-tmp-pvc
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:6.2.1
          ports:
            - name: http
              containerPort: 7878
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Australia/Sydney
          volumeMounts:
            - name: data
              mountPath: /config
            - name: media
              mountPath: /multimedia
            - name: tmp
              mountPath: /complete
              subPath: complete
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: radarr
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: http
      name: http
  selector:
    app: radarr
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: dns-issuer
  name: radarr-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: radarr.k8s.tolly-home.com
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: radarr-https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-radarr
spec:
  parentRefs:
    - name: radarr-gateway
  hostnames:
    - radarr.k8s.tolly-home.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: radarr
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
