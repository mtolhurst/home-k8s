---
# Create a postgres 15 db
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mealie-pg-cluster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  enableSuperuserAccess: true
  storage:
    size: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: versity-secret
  namespace: mealie
type: Opaque
data:
  AWS_ACCESS_KEY_ID: YWRtaW4=
  AWS_SECRET_ACCESS_KEY: YWRtaW4= 

