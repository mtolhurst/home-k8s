---
# Create a postgres 15 db
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mealie-pg-cluster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  storage:
    size: 2Gi

---
# PVC for mealie data not in pg
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mealie-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
  labels:
    app: mealie
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mealie-pvc
      containers:
        - name: mealie
          image: ghcr.io/mealie-recipes/mealie:v3.14.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              port: "http"
              path: "/"
          readinessProbe:
            httpGet:
              port: "http"
              path: "/"
          volumeMounts:
            - name: data
              mountPath: /app/data/
          env:
            - name: ALLOW_SIGNUP
              value: "false"
            - name: PUID
              value: "1000"
            - name: GUID
              value: "1000"
            - name: TZ
              value: Australia/Sydney
            - name: BASE_URL
              value: http://10.2.16.4
            - name: DB_ENGINE
              value: postgres
            - name: POSTGRES_SERVER
              value: $(MEALIE_PG_CLUSTER_RW_SERVICE_HOST)
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mealie-pg-cluster-superuser
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealie-pg-cluster-superuser
                  key: password
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: mealie-pg-cluster-superuser
                  key: port
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mealie-pg-cluster-superuser
                  key: dbname
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: mealie
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: http
  selector:
    app: mealie
  sessionAffinity: None
  type: ClusterIP

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: dns-issuer
  name: mealie-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: mealie.k8s.tolly-home.com
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: mealie-https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
spec:
  parentRefs:
    - name: mealie-gateway
  hostnames:
    - mealie.k8s.tolly-home.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: mealie
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
