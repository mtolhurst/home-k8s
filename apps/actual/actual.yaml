---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual
  labels:
    app: actual
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual
  template:
    metadata:
      labels:
        app: actual
    spec:
      containers:
      - image: docker.io/actualbudget/actual-server:sha-4820331-alpine
        name: actual
        ports:
        - containerPort: 5006
          name: http
        volumeMounts:
        - name: actual-data
          mountPath: /data
      volumes:
      - name: actual-data
        persistentVolumeClaim:
          claimName: actual-pvc
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: actual
  labels:
    app: actual
spec:
  ports:
    - port: 80
      name: http
      protocol: TCP
      targetPort: http
  selector:
    app: actual
  type: clusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: actual-ingress
  namespace: actual
  annotations:
    cert-manager.io/cluster-issuer: "selfsignet-issuer"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - actual.home
      secretName: tls-secret
  rules:
    - host: actual.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: actual
                port:
                  number: 80

