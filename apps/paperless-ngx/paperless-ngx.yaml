---
# TODO prometheus monitoring
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-pg-cluster
spec:
  instances: 1
  storage:
    size: 5Gi
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: paperless-ngx
  template:
    metadata:
      labels:
        app: paperless-ngx
    spec:
      volumes:
        - name: data
          nfs:
            server: nas.home
            path: /mnt/nas/documents
            readonly: false
      containers:
        - name: broker
          image: redis:8.6.2-alpine
          imagePullPolicy: IfNotPresent
        - name: webserver
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.13
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
              subPath: data/
            - name: data
              mountPath: /usr/src/paperless/media
              subPath: media/
            - name: data
              mountPath: /usr/src/paperless/export
              subPath: export/
            - name: data
              mountPath: /usr/src/paperless/consume
              subPath: consume/
          env: 
            - name: PAPERLESS_REDIS
              value: redis://127.0.0.1:6379
            - name: PAPERLESS_PORT
              value: "8000"
            - name: PAPERLESS_URL
              value: https://docs.k8s.tolly-home.com
            - name: PAPERLESS_DBHOST
              valueFrom:
                secretKeyRef:
                  name: paperless-pg-cluster-app
                  key: host
            - name: PAPERLESS_FILENAME_FORMAT
              value: "{{ document_type }}/{{ title }}-{{ doc-pk }}"
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: paperless-pg-cluster-app
                  key: username
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-pg-cluster-app
                  key: password
            - name: PAPERLESS_DBPORT
              valueFrom:
                secretKeyRef:
                  name: paperless-pg-cluster-app
                  key: port
            - name: PAPERLESS_DBNAME
              valueFrom:
                secretKeyRef:
                  name: paperless-pg-cluster-app
                  key: dbname

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: http
  selector:
    app: paperless-ngx
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: dns-issuer
  name: paperless-ngx-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: docs.k8s.tolly-home.com
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: paperless-ngx-https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
spec:
  parentRefs:
    - name: paperless-ngx-gateway
  hostnames:
    - docs.k8s.tolly-home.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: paperless-ngx
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
