apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-parent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    name: infra-parent
spec:
  project: default
  source:
    repoURL: https://github.com/mtolhurst/home-k8s.git
    targetRevision: HEAD
    path: parent-apps/infra
  destination:
    server: https://kubernetes.default.svc
    namespace: infra-parent
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: 
      prune: true 
      selfHeal: true
      allowEmpty: false 
